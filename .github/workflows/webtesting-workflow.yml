name: run Web Testing
run-name: On push - Web Testing Run
on: [push]

jobs:
  web-tests:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Node.js 24.14
        uses: actions/setup-node@v4
        with:
          node-version: '24.14'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -U -r requirements.txt
          sudo npm install playwright
          sudo npx playwright install-deps
          rfbrowser init

      - name: Run RF WEB Tests
        run: |
          robot -d ./results -v HEADLESS:true -v BROWSER:chromium tests/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-chromium
          path: ./results
          if-no-files-found: ignore
          retention-days: 4
      - name: Download Test Results
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: results-chromium
      - name: Send Report
        if: always()
        uses: joonvena/robotframework-reporter-action@v2.5
        with:
          report_path: results-chromium
          gh_access_token: ${{ secrets.GITHUB_TOKEN }}
          show_passed_tests: false
